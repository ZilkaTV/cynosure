name: Engine maintenance (auto-vendor + Max Tiles backfill)

# Self-healing pipeline for Max Tiles: OpenFront ships engine updates
# periodically, and a game only replays correctly against the *exact*
# commit it was played on (see src/vendor/openfront-core/README.md). When a
# new commit shows up in real games and nothing's vendored for it yet, Max
# Tiles silently stays uncomputed for those games until someone notices and
# runs scripts/detect-engine-commits.mjs + vendor-engine.mjs by hand - which
# is exactly what kept happening. This runs both steps automatically:
#
#   1. scripts/auto-vendor-missing.mjs - finds engine commits real recent
#      games actually used that we don't have a vendored tree for, and
#      vendors each one (scripts/vendor-engine.mjs already self-verifies via
#      `tsc -b` before this workflow trusts the result enough to commit it).
#   2. scripts/backfill-tile-stats.mjs - computes Max Tiles for any recent
#      game still missing from the shared cache (with retries - most
#      failures here are transient, not permanent), whether that's because
#      step 1 just vendored something new or a fetch simply failed earlier.
#
# Runs daily rather than on the site's own 5-minute cron cadence - checking
# for a new engine version several times an hour would be pure waste, and
# neither step is time-critical (Max Tiles is a nice-to-have stat, not
# something that blocks anything else on the site).
#
# A newly-vendored tree is opened as a PULL REQUEST, never pushed straight to
# master: vendor-engine.mjs's tsc -b check only proves the copied code
# type-checks, which says nothing about whether it's safe - this pulls real
# third-party source from openfrontio/OpenFrontIO and ships it straight into
# every visitor's browser once merged. A compromised upstream commit (or even
# just a genuine bug) landing here deserves a human looking at the diff
# before it goes live, the same bar any other change to this site gets.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Check for new OpenFront engine commits and vendor them
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: node scripts/auto-vendor-missing.mjs

      - name: Open a PR for any newly-vendored engine tree
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain src/vendor tsconfig.json src/lib/replaySimCore.ts)" ]; then
            echo "No new engine commits to vendor."
            exit 0
          fi

          # Named after the specific short SHA(s) just vendored, not a
          # timestamp - this makes the branch name deterministic, so if
          # yesterday's run already opened a PR for this exact commit that's
          # still awaiting review, today's run recognizes the same branch
          # already exists remotely and skips instead of opening a duplicate
          # PR for the same commit every single day until someone merges it.
          NEW_DIRS=$(git status --porcelain src/vendor | awk '{print $2}' | grep -oE 'openfront-core-[0-9a-f]{7}' | sort -u | tr '\n' '-' | sed 's/-$//')
          BRANCH="auto-vendor-${NEW_DIRS}"

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "Branch $BRANCH already exists - a PR for this commit is presumably already open and awaiting review. Not opening a duplicate."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add src/vendor tsconfig.json src/lib/replaySimCore.ts
          git commit -m "Auto-vendor OpenFront engine commit(s): ${NEW_DIRS}"
          git push origin "$BRANCH"
          gh pr create --title "Auto-vendor OpenFront engine commit(s): ${NEW_DIRS}" \
            --body "Opened automatically after \`vendor-engine.mjs\`'s own \`tsc -b\` check passed. That only confirms the vendored code type-checks - please review the actual diff (new files under \`src/vendor/\`) before merging, since this pulls new third-party source into the site's own bundle." \
            --base master --head "$BRANCH"

      - name: Backfill Max Tiles for games still missing from the shared cache
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: node scripts/backfill-tile-stats.mjs
